<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lettres pour Salmouchee 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --hot:#ff1f8e;--pink:#ff6eb4;--rose:#ffb3d9;--soft:#ffe0f0;
  --cream:#fff0f8;--navy:#0d1f3c;--gold:#ffd60a;
  --shadow:0 8px 40px rgba(255,31,142,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden;}
.bg-layer::before{content:'';position:absolute;inset:0;background:url("58165D45-DA04-4BDF-9A70-00AA4ADA64CA.png") center/cover no-repeat;z-index:-1;opacity:.35;}

.bg-layer{position:fixed;inset:0;z-index:0;
background:
radial-gradient(ellipse 70% 50% at 10% 10%,#ff1f8e1a 0%,transparent 55%),
radial-gradient(ellipse 60% 50% at 90% 90%,#0d1f3c18 0%,transparent 55%),
repeating-linear-gradient(45deg,#ff6eb408 0px,#ff6eb408 1px,transparent 1px,transparent 20px),
linear-gradient(160deg,#fff0f8 0%,#ffe8f4 60%,#f0f4ff 100%);
}
.bg-layer::after{content:’’;position:absolute;inset:0;background-image:radial-gradient(circle,#ff1f8e0d 1px,transparent 1px);background-size:18px 18px;pointer-events:none;}

/* ── HEADER ── */
.header{position:relative;z-index:2;text-align:center;padding:36px 20px 20px;}
.site-logo{display:block;max-width:260px;width:75%;margin:0 auto 10px;filter:drop-shadow(0 4px 16px #ff1f8e88);}
.header-sub{font-size:14px;color:#aaa;font-style:italic;margin-bottom:6px;}
.countdown-badge{
display:inline-block;
background:linear-gradient(135deg,var(–navy),#1a3a6e);
color:var(–gold);
font-family:‘Fredoka One’,sans-serif;
font-size:13px;padding:7px 18px;border-radius:50px;
box-shadow:0 4px 14px #0d1f3c44;margin-bottom:4px;
}
.back-btn{
display:inline-flex;align-items:center;gap:8px;
background:linear-gradient(135deg,var(–hot),var(–pink));
color:#fff;font-family:‘Fredoka One’,sans-serif;font-size:15px;
padding:10px 22px;border-radius:50px;text-decoration:none;
box-shadow:0 4px 16px #ff1f8e44;margin-bottom:20px;
transition:transform .2s;
}
.back-btn:hover{transform:scale(1.05);}

/* ── PROGRESS ── */
.progress-section{
position:relative;z-index:2;
max-width:600px;margin:0 auto 24px;padding:0 20px;
text-align:center;
}
.progress-label{font-family:‘Fredoka One’,sans-serif;font-size:14px;color:var(–hot);margin-bottom:8px;}
.progress-bar{width:100%;height:12px;background:#ffe0f0;border-radius:50px;overflow:hidden;border:1.5px solid var(–rose);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(–hot),var(–pink),var(–gold));border-radius:50px;transition:width 1s ease;}

/* ── GRILLE ── */
.grid{
position:relative;z-index:2;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
gap:10px;
max-width:680px;margin:0 auto 40px;
padding:0 16px;
}

.letter-tile{
aspect-ratio:1;
border-radius:16px;
display:flex;flex-direction:column;align-items:center;justify-content:center;
cursor:pointer;
transition:transform .25s,box-shadow .25s;
position:relative;overflow:hidden;
border:2px solid transparent;
}
.letter-tile.unlocked{
background:linear-gradient(145deg,#fff0f8,#fff);
border-color:var(–rose);
box-shadow:0 4px 16px #ff1f8e22;
}
.letter-tile.unlocked:hover{transform:scale(1.08) rotate(-2deg);box-shadow:0 10px 28px #ff1f8e44;border-color:var(–hot);}
.letter-tile.today{
background:linear-gradient(135deg,var(–hot),var(–pink));
border-color:var(–hot);
box-shadow:0 6px 24px #ff1f8e55;
animation:todayPulse 2s ease-in-out infinite;
}
@keyframes todayPulse{0%,100%{box-shadow:0 6px 24px #ff1f8e55;}50%{box-shadow:0 6px 40px #ff1f8e99;}}
.letter-tile.today:hover{transform:scale(1.1);}
.letter-tile.locked{
background:linear-gradient(145deg,#f0f0f8,#e8e8f0);
border-color:#ddd;
cursor:not-allowed;
opacity:.65;
}
.letter-tile.birthday{
background:linear-gradient(135deg,var(–gold),#ffaa00);
border-color:#ffaa00;
box-shadow:0 6px 24px #ffd60a66;
}
.letter-tile.birthday:hover{transform:scale(1.1) rotate(2deg);}

.tile-num{font-family:‘Fredoka One’,sans-serif;font-size:18px;line-height:1;}
.letter-tile.unlocked .tile-num,.letter-tile.today .tile-num{color:var(–hot);}
.letter-tile.today .tile-num{color:#fff;}
.letter-tile.locked .tile-num{color:#bbb;}
.letter-tile.birthday .tile-num{color:var(–navy);font-size:20px;}
.tile-icon{font-size:18px;margin-top:2px;}
.tile-date{font-size:8px;color:#ccc;margin-top:2px;font-weight:700;}
.letter-tile.unlocked .tile-date{color:#ffb3d9;}
.letter-tile.today .tile-date{color:#ffe8f4;}
.letter-tile.birthday .tile-date{color:#7a5000;}

/* ── MODAL ── */
.modal{display:none;position:fixed;inset:0;z-index:500;background:#0d1f3ccc;backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.modal-inner{
background:#fff;border-radius:28px;
padding:36px 30px;max-width:500px;width:100%;
animation:popIn .4s cubic-bezier(.2,.8,.2,1);
border:3px solid var(–hot);
position:relative;max-height:90vh;overflow-y:auto;
box-shadow:0 20px 60px #ff1f8e44;
}
@keyframes popIn{from{transform:scale(.65);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-close{
position:absolute;top:14px;right:14px;
background:var(–soft);border:none;
width:34px;height:34px;border-radius:50%;
font-size:16px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:background .2s;
}
.modal-close:hover{background:var(–rose);}
.modal-day{
font-family:‘Fredoka One’,sans-serif;font-size:12px;
color:#bbb;text-transform:uppercase;letter-spacing:.12em;
margin-bottom:6px;
}
.modal-title{
font-family:‘Fredoka One’,sans-serif;
font-size:clamp(18px,4vw,24px);
color:var(–hot);margin-bottom:4px;line-height:1.2;
}
.modal-date-badge{
display:inline-block;
background:var(–soft);color:var(–hot);
font-size:12px;font-weight:800;
padding:4px 14px;border-radius:50px;
margin-bottom:20px;
}
.modal-divider{height:2px;background:linear-gradient(90deg,var(–hot),transparent);border-radius:2px;margin-bottom:20px;}
.modal-content{
background:linear-gradient(135deg,#fff9f0,#fff8fc);
border:1.5px solid #ffccaa;border-radius:14px;
padding:22px;text-align:left;
font-size:15px;line-height:1.85;color:#444;
white-space:pre-line;
}
.modal-content.birthday-content{
background:linear-gradient(135deg,#fffbe6,#fff9f0);
border-color:var(–gold);
}
.modal-nav{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.nav-btn{
font-family:‘Fredoka One’,sans-serif;font-size:14px;
padding:10px 22px;border:none;border-radius:50px;
cursor:pointer;transition:transform .18s;
}
.nav-btn:hover{transform:scale(1.06);}
.nav-prev{background:var(–soft);color:var(–hot);}
.nav-next{background:linear-gradient(135deg,var(–hot),var(–pink));color:#fff;}

/* ── LOCKED MODAL ── */
.locked-modal{display:none;position:fixed;inset:0;z-index:500;background:#0d1f3ccc;backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;}
.locked-modal.open{display:flex;}
.locked-modal-inner{
background:#fff;border-radius:28px;
padding:36px 28px;max-width:400px;width:100%;
text-align:center;
animation:popIn .4s cubic-bezier(.2,.8,.2,1);
border:3px solid #ddd;
position:relative;
}
.lock-icon{font-size:60px;display:block;margin-bottom:12px;}
.lock-title{font-family:‘Fredoka One’,sans-serif;font-size:22px;color:var(–navy);margin-bottom:8px;}
.lock-text{font-size:14px;color:#888;line-height:1.6;}
.lock-close{
margin-top:20px;
font-family:‘Fredoka One’,sans-serif;font-size:15px;
padding:11px 26px;border:none;border-radius:50px;
background:linear-gradient(135deg,var(–navy),#1a3a6e);
color:#fff;cursor:pointer;transition:transform .2s;
}
.lock-close:hover{transform:scale(1.05);}
</style>

</head>

<div class="bg-layer"></div>

<div class="header">
  <a href="index.html" class="back-btn">← Retour au site</a>

  </div>

<script>
const LETTERS = [{"day": 1, "date": "03/05/2026", "isoDate": "2026-05-03", "title": "Lettre 1 — Le petit matin", "content": "Salmouchee,\n\nAujourd'hui en me réveillant, t'as été ma première pensée. Pas parce que j'essaie d'être romantique — c'est juste comme ça que ça se passe depuis que tu existes dans ma vie. T'as cette façon d'occuper mes pensées même quand t'es loin, et honnêtement je m'en plains pas du tout.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 2, "date": "04/05/2026", "isoDate": "2026-05-04", "title": "Lettre 2 — Ce que j'aime chez toi", "content": "Salmouchee,\n\nIl y a ce truc chez toi que je sais pas vraiment expliquer. C'est pas juste ta façon d'être belle — c'est ta façon d'être toi. Cette énergie que t'as, cette façon de rire, de réagir aux choses. T'es authentique d'une manière rare et ça me touche plus que tu le réalises.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 3, "date": "05/05/2026", "isoDate": "2026-05-05", "title": "Lettre 3 — La distance", "content": "Salmouchee,\n\nMême quand on se parle pas, t'es là. Dans une chanson qui passe, dans un truc drôle que je vois et que j'ai envie de te montrer, dans une pensée qui surgit de nulle part. C'est dingue comme quelqu'un peut prendre autant de place sans même être physiquement là.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 4, "date": "06/05/2026", "isoDate": "2026-05-06", "title": "Lettre 4 — Gratitude", "content": "Salmouchee,\n\nJe voulais juste te dire merci aujourd'hui. Merci d'être toi, d'être là, de me rendre la vie plus colorée. T'as pas idée de l'effet que t'as sur moi — sur mon humeur, sur ma façon de voir les choses. T'es un cadeau même si tu réalises pas à quel point.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 5, "date": "07/05/2026", "isoDate": "2026-05-07", "title": "Lettre 5 — L'avenir", "content": "Salmouchee,\n\nDes fois je pense à l'avenir et je me demande à quoi ça ressemblera. Mais dans tous les scénarios que j'imagine, t'es là. C'est involontaire — c'est juste que t'es devenue une évidence pour moi. Et les évidences, on les protège.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 6, "date": "08/05/2026", "isoDate": "2026-05-08", "title": "Lettre 6 — Les petits riens", "content": "Salmouchee,\n\nC'est les petits trucs qui comptent le plus finalement. Un message à l'improviste. Un souvenir qui remonte. Une blague qui n'a de sens que pour nous deux. C'est ça qui construit quelque chose de solide — pas les grands gestes, mais la somme de tous ces petits riens qui forment quelque chose d'énorme.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 7, "date": "09/05/2026", "isoDate": "2026-05-09", "title": "Lettre 7 — La fierté", "content": "Salmouchee,\n\nJe suis fier de toi. Pas de façon condescendante — vraiment fier. De qui tu es, de ce que tu fais, de la façon dont tu navigues dans la vie. T'as une force en toi que tu sous-estimes sûrement. Mais moi je la vois, et elle me blufle.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 8, "date": "10/05/2026", "isoDate": "2026-05-10", "title": "Lettre 8 — One Piece et toi", "content": "Salmouchee,\n\nTu sais dans One Piece, Luffy dit que ses nakamas c'est son trésor ? Je comprends maintenant ce qu'il veut dire. T'es ce genre de personne dans ma vie — celle pour qui tu traverses n'importe quelle tempête sans hésiter. Mon trésor à moi il s'appelle Salmouchee.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 9, "date": "11/05/2026", "isoDate": "2026-05-11", "title": "Lettre 9 — Le sourire", "content": "Salmouchee,\n\nTon sourire est criminellement beau. Je sais que c'est cliché de dire ça mais c'est littéralement la vérité. Il y a quelque chose dans ta façon de sourire qui rend tout plus léger autour de toi. Je suis le témoin de ce phénomène et je valide pleinement.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 10, "date": "12/05/2026", "isoDate": "2026-05-12", "title": "Lettre 10 — Quand ça va pas", "content": "Salmouchee,\n\nLes jours où ça va pas, pense à cette lettre. T'es pas seule. Je suis là même à distance, même en silence. Et les jours difficiles ça passe — pas parce que les problèmes disparaissent, mais parce qu'on est plus solide qu'on le croit. Toi surtout.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 11, "date": "13/05/2026", "isoDate": "2026-05-13", "title": "Lettre 11 — L'admiration", "content": "Salmouchee,\n\nT'as cette capacité à être lumineuse même sans t'en rendre compte. C'est le genre de qualité qu'on peut pas forcer — soit t'as, soit t'as pas. Et toi t'as. En abondance. Je t'observe et je me dis que t'es vraiment quelqu'un d'exceptionnel.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 12, "date": "14/05/2026", "isoDate": "2026-05-14", "title": "Lettre 12 — Le calme", "content": "Salmouchee,\n\nIl y a quelque chose de très calme et très sûr dans ce que je ressens pour toi. Pas de doute, pas de question. Juste une certitude tranquille que t'es importante pour moi et que ça changera pas. Ce genre de certitude c'est rare, et je la chéris.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 13, "date": "15/05/2026", "isoDate": "2026-05-15", "title": "Lettre 13 — Hello Kitty", "content": "Salmouchee,\n\nTu sais ce que Hello Kitty et toi avez en commun ? Vous rendez le monde plus mignon juste en existant dedans. Sauf que toi t'as un niveau de personnalité en plus qui écrase tout. Hello Kitty t'envie, je t'assure. 🎀\n\n— Je t'aime Salmouchee ❤️"}, {"day": 14, "date": "16/05/2026", "isoDate": "2026-05-16", "title": "Lettre 14 — La curiosité", "content": "Salmouchee,\n\nJ'aime ta façon de voir le monde. Ta curiosité, tes réactions, ta façon d'être. Il y a tellement à découvrir chez une personne et j'ai l'impression que chaque conversation avec toi me révèle quelque chose de nouveau. C'est fascinant dans le bon sens du terme.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 15, "date": "17/05/2026", "isoDate": "2026-05-17", "title": "Lettre 15 — Le courage", "content": "Salmouchee,\n\nIl faut du courage pour être soi-même dans ce monde. Et toi tu le fais avec une aisance qui force le respect. Tu t'excuses pas d'être toi. Tu prends ta place. Et c'est exactement comme ça que ça devrait être. Continue.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 16, "date": "18/05/2026", "isoDate": "2026-05-18", "title": "Lettre 16 — Tomodachi", "content": "Salmouchee,\n\nSi on était des personnages Tomodachi Life, je suis sûr que notre compatibilité serait à 100%. Pas parce que je veux que ce soit parfait — mais parce qu'avec toi même les imperfections ont l'air d'aller de soi. On s'ajuste naturellement et ça c'est précieux.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 17, "date": "19/05/2026", "isoDate": "2026-05-19", "title": "Lettre 17 — La nuit", "content": "Salmouchee,\n\nLes nuits où je dors pas bien, tu sais à quoi je pense ? À des trucs simples. Une conversation qu'on a eu. Un truc drôle que t'as dit. Et bizarrement ça suffit à rendre la nuit plus douce. T'as cet effet-là sur moi et j'espère que ça te fait sourire.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 18, "date": "20/05/2026", "isoDate": "2026-05-20", "title": "Lettre 18 — L'unicité", "content": "Salmouchee,\n\nIl n'y a qu'une seule toi dans tout l'univers. Une seule personne avec exactement ta façon de penser, de rire, d'exister. C'est vertigineux quand on y réfléchit vraiment. Et j'ai la chance de connaître cette personne unique. Je mesure cette chance chaque jour.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 19, "date": "21/05/2026", "isoDate": "2026-05-21", "title": "Lettre 19 — La promesse", "content": "Salmouchee,\n\nJe te promets pas la perfection. Je te promets juste d'être là, sincèrement, sans masque. De penser à toi, de te respecter, de tenir à toi pour de vrai. Pas des grandes déclarations — juste des actes constants et honnêtes. C'est ça que je t'offre.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 20, "date": "22/05/2026", "isoDate": "2026-05-22", "title": "Lettre 20 — L'éclat", "content": "Salmouchee,\n\nT'as un éclat particulier. Pas juste à l'extérieur — intérieurement aussi. Une lumière qui transperce même tes moments de doute. Je la vois cette lumière, même quand toi tu la vois pas. Et j'ai envie de te la décrire jusqu'à ce que tu la voies toi aussi.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 21, "date": "23/05/2026", "isoDate": "2026-05-23", "title": "Lettre 21 — Le petit matin", "content": "Salmouchee,\n\nAujourd'hui en me réveillant, t'as été ma première pensée. Pas parce que j'essaie d'être romantique — c'est juste comme ça que ça se passe depuis que tu existes dans ma vie. T'as cette façon d'occuper mes pensées même quand t'es loin, et honnêtement je m'en plains pas du tout.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 22, "date": "24/05/2026", "isoDate": "2026-05-24", "title": "Lettre 22 — Ce que j'aime chez toi", "content": "Salmouchee,\n\nIl y a ce truc chez toi que je sais pas vraiment expliquer. C'est pas juste ta façon d'être belle — c'est ta façon d'être toi. Cette énergie que t'as, cette façon de rire, de réagir aux choses. T'es authentique d'une manière rare et ça me touche plus que tu le réalises.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 23, "date": "25/05/2026", "isoDate": "2026-05-25", "title": "Lettre 23 — La distance", "content": "Salmouchee,\n\nMême quand on se parle pas, t'es là. Dans une chanson qui passe, dans un truc drôle que je vois et que j'ai envie de te montrer, dans une pensée qui surgit de nulle part. C'est dingue comme quelqu'un peut prendre autant de place sans même être physiquement là.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 24, "date": "26/05/2026", "isoDate": "2026-05-26", "title": "Lettre 24 — Gratitude", "content": "Salmouchee,\n\nJe voulais juste te dire merci aujourd'hui. Merci d'être toi, d'être là, de me rendre la vie plus colorée. T'as pas idée de l'effet que t'as sur moi — sur mon humeur, sur ma façon de voir les choses. T'es un cadeau même si tu réalises pas à quel point.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 25, "date": "27/05/2026", "isoDate": "2026-05-27", "title": "Lettre 25 — L'avenir", "content": "Salmouchee,\n\nDes fois je pense à l'avenir et je me demande à quoi ça resse un cadeau même si tu réalises pas à quel point.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 65, "date": "06/07/2026", "isoDate": "2026-07-06", "title": "Lettre 65 — L'avenir", "content": "Salmouchee,\n\nDes fois je pense à l'avenir et je me demande à quoi ça ressemblera. Mais dans tous les scénarios que j'imagine, t'es là. C'est involontaire — c'est juste que t'es devenue une évidence pour moi. Et les évidences, on les protège.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 66, "date": "07/07/2026", "isoDate": "2026-07-07", "title": "Lettre 66 — Les petits riens", "content": "Salmouchee,\n\nC'est les petits trucs qui comptent le plus finalement. Un message à l'improviste. Un souvenir qui remonte. Une blague qui n'a de sens que pour nous deux. C'est ça qui construit quelque chose de solide — pas les grands gestes, mais la somme de tous ces petits riens qui forment quelque chose d'énorme.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 67, "date": "08/07/2026", "isoDate": "2026-07-08", "title": "Lettre 67 — La fierté", "content": "Salmouchee,\n\nJe suis fier de toi. Pas de façon condescendante — vraiment fier. De qui tu es, de ce que tu fais, de la façon dont tu navigues dans la vie. T'as une force en toi que tu sous-estimes sûrement. Mais moi je la vois, et elle me blufle.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 68, "date": "09/07/2026", "isoDate": "2026-07-09", "title": "Lettre 68 — One Piece et toi", "content": "Salmouchee,\n\nTu sais dans One Piece, Luffy dit que ses nakamas c'est son trésor ? Je comprends maintenant ce qu'il veut dire. T'es ce genre de personne dans ma vie — celle pour qui tu traverses n'importe quelle tempête sans hésiter. Mon trésor à moi il s'appelle Salmouchee.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 69, "date": "10/07/2026", "isoDate": "2026-07-10", "title": "Lettre 69 — Le sourire", "content": "Salmouchee,\n\nTon sourire est criminellement beau. Je sais que c'est cliché de dire ça mais c'est littéralement la vérité. Il y a quelque chose dans ta façon de sourire qui rend tout plus léger autour de toi. Je suis le témoin de ce phénomène et je valide pleinement.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 70, "date": "11/07/2026", "isoDate": "2026-07-11", "title": "Lettre 70 — Quand ça va pas", "content": "Salmouchee,\n\nLes jours où ça va pas, pense à cette lettre. T'es pas seule. Je suis là même à distance, même en silence. Et les jours difficiles ça passe — pas parce que les problèmes disparaissent, mais parce qu'on est plus solide qu'on le croit. Toi surtout.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 71, "date": "12/07/2026", "isoDate": "2026-07-12", "title": "Lettre 71 — L'admiration", "content": "Salmouchee,\n\nT'as cette capacité à être lumineuse même sans t'en rendre compte. C'est le genre de qualité qu'on peut pas forcer — soit t'as, soit t'as pas. Et toi t'as. En abondance. Je t'observe et je me dis que t'es vraiment quelqu'un d'exceptionnel.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 72, "date": "13/07/2026", "isoDate": "2026-07-13", "title": "Lettre 72 — Le calme", "content": "Salmouchee,\n\nIl y a quelque chose de très calme et très sûr dans ce que je ressens pour toi. Pas de doute, pas de question. Juste une certitude tranquille que t'es importante pour moi et que ça changera pas. Ce genre de certitude c'est rare, et je la chéris.\n\n— Je t'aime Salmouchee ❤️"}, {"day": 73, "date": "14/07/2026", "isoDate": "2026-07-14", "title": "Lettre 73 — Hello Kitty", "content": "Salmouchee,\n\nTu sais ce que Hello Kitty et toi avez en commun ? Vous rendez le monde plus mignon juste en existant dedans. Sauf que toi t'as un niveau de personnalité en plus qui écrase tout. Hello Kitty t'envie, je t'assure. 🎀\n\n— Je t'aime Salmouchee ❤️"}, {"day": 74, "date": "15/07/2026", "isoDate": "2026-07-15", "title": "Lettre 74 — La curiosité", "content": "Salmouchee,\n\nJ'aime ta façon de voir le monde. Ta curiosité, tes réactions, ta façon d'être. Il y a tellement à découvrir chez une personne et j'ai l'impression que chaque conversation avec const START_ISO = "2026-05-03";
const END_ISO   = "2026-10-26";

function getTodayISO(){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function daysBetween(a,b){
  return Math.round((new Date(b)-new Date(a))/(1000*60*60*24));
}

function build(){
  const today = getTodayISO();
  const totalDays = daysBetween(START_ISO, END_ISO);
  const elapsed  = Math.max(0, daysBetween(START_ISO, today));
  const unlocked = Math.min(elapsed + 1, LETTERS.length);
  const daysLeft = Math.max(0, daysBetween(today, END_ISO));

  // Countdown
  document.getElementById('countdownBadge').textContent =
    daysLeft === 0 ? '🎂 Joyeux Anniversaire Salmouchee !' :
    `⏳ ${daysLeft} jour${daysLeft>1?'s':''} avant ton anniversaire`;

  // Progress
  const pct = Math.round((unlocked/LETTERS.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent =
    `${unlocked} lettre${unlocked>1?'s':''} débloquée${unlocked>1?'s':''} sur ${LETTERS.length} 💌`;

  // Grid
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  LETTERS.forEach((l,i)=>{
    const tile = document.createElement('div');
    const isToday = l.isoDate === today;
    const isUnlocked = l.isoDate <= today;
    const isBirthday = l.isoDate === END_ISO;
    
    tile.className = 'letter-tile ' + 
      (isBirthday && isUnlocked ? 'birthday' :
       isToday ? 'today' :
       isUnlocked ? 'unlocked' : 'locked');
    
    tile.innerHTML = `
      <span class="tile-num">${isBirthday ? '🎂' : l.day}</span>
      <span class="tile-icon">${isToday ? '💌' : isUnlocked ? '💕' : '🔒'}</span>
      <span class="tile-date">${l.date.slice(0,5)}</span>
    `;
    
    tile.addEventListener('click', ()=>{
      if(isUnlocked) openLetter(i);
      else openLocked(l);
    });
    grid.appendChild(tile);
  });
}

let currentIdx = 0;

function openLetter(idx){
  currentIdx = idx;
  const l = LETTERS[idx];
  const today = getTodayISO();
  document.getElementById('modalDay').textContent = `Lettre ${l.day} sur ${LETTERS.length}`;
  document.getElementById('modalTitle').textContent = l.title;
  document.getElementById('modalDateBadge').textContent = `📅 ${l.date}`;
  document.getElementById('modalContent').textContent = l.content;
  document.getElementById('modalContent').className = 
    'modal-content' + (l.isoDate === END_ISO ? ' birthday-content' : '');
  
  // Nav buttons
  document.getElementById('navPrev').style.display = idx===0 ? 'none' : '';
  const nextAvail = idx+1 < LETTERS.length && LETTERS[idx+1].isoDate <= today;
  document.getElementById('navNext').style.display = nextAvail ? '' : 'none';
  
  document.getElementById('letterModal').classList.add('open');
}

function navigateLetter(dir){
  const newIdx = currentIdx + dir;
  const today = getTodayISO();
  if(newIdx>=0 && newIdx<LETTERS.length && LETTERS[newIdx].isoDate<=today){
    openLetter(newIdx);
  }
}

function closeModal(){document.getElementById('letterModal').classList.remove('open');}
document.getElementById('letterModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('letterModal')) closeModal();
});

function openLocked(l){
  const daysLeft = daysBetween(getTodayISO(), l.isoDate);
  document.getElementById('lockText').textContent =
    `Cette lettre sera disponible le ${l.date}. Encore ${daysLeft} jour${daysLeft>1?'s':''} à patienter… 🌸`;
  document.getElementById('lockedModal').classList.add('open');
}
function closeLockedModal(){document.getElementById('lockedModal').classList.remove('open');}
document.getElementById('lockedModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('lockedModal')) closeLockedModal();
});

build();
</script>
