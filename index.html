<!DOCTYPE html>  
<html lang="fr">  
<head>  
  <meta charset="UTF-8">  
  <title>Moi & Salma ❤️</title>  
  <style>  
    body {  
      margin: 0;  
      font-family: Arial, sans-serif;  
      text-align: center;  
      color: white;  
      background: linear-gradient(to right, #ff6a88, #ff99ac);  
    }  
  
    h1 {  
      margin-top: 50px;  
      font-size: 3em;  
    }  
  
    p {  
      font-size: 1.5em;  
      margin: 20px;  
    }  
  
    .heart {  
      font-size: 40px;  
      animation: float 2s infinite;  
    }  
  
    @keyframes float {  
      0% { transform: translateY(0); }  
      50% { transform: translateY(-20px); }  
      100% { transform: translateY(0); }  
    }  
  
    .box {  
      margin-top: 40px;  
      padding: 20px;  
    }  
  
    img {  
      width: 200px;  
      border-radius: 15px;  
      margin: 10px;  
    }  
  </style>  
</head>  
<body>  
  
  <h1>Moi & Salma ❤️</h1>  
  
  <p>Depuis que je t’ai rencontrée, ma vie est devenue plus belle 💕</p>  
  
  <div class="heart">❤️ ❤️ ❤️</div>  
  
  <div class="box">  
    <p>Ce site est juste pour te dire à quel point tu comptes pour moi 💌</p>  
    <p>Je t’aime Salma ❤️</p>  
  </div>  
  
  <div>  
    <!-- Tu peux remplacer les images -->  
    <img src="https://via.placeholder.com/200" alt="photo1">  
    <img src="https://via.placeholder.com/200" alt="photo2">  
  </div>  
  
</body>  
</html>
