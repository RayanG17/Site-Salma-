<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pour Salmouchee</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose-deep:   #8b2252;
      --rose-mid:    #c4547a;
      --rose-soft:   #e8a0b4;
      --gold:        #c9924a;
      --cream:       #fff8f9;
      --text-dark:   #3a1525;
      --text-mid:    #7a3555;
      --glass:       rgba(255,255,255,0.45);
      --glass-border:rgba(196,84,122,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* BACKGROUND — fixé pour mobile/tablette */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('bg%20.PNG') center/cover no-repeat fixed;
      background-color: #fdf0f4;
    }

    @media (max-width: 1024px) {
      .bg-layer {
        background-attachment: scroll;
        background-position: center top;
      }
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: rgba(253, 240, 244, 0.1);
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    header { padding: 54px 0 38px; text-align: center; animation: fadeDown .9s ease both; }

    .logo-wrap { margin-bottom: 16px; }
    .logo-img {
      width: clamp(180px, 35vw, 300px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 15px 25px rgba(139,34,82,.25));
    }

    .eyebrow { font-weight: 200; font-size: 11px; letter-spacing: .4em; text-transform: uppercase; color: var(--rose-mid); margin-bottom: 10px; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400; font-style: italic;
      font-size: clamp(32px, 6vw, 58px);
      color: var(--rose-deep);
      line-height: 1.1;
      margin-bottom: 6px;
    }
    h1 strong { font-style: normal; font-weight: 700; }

    .subtitle { font-size: 13px; font-weight: 300; color: var(--text-mid); letter-spacing: .07em; }

    .divider { display: flex; align-items: center; gap: 14px; margin: 0 auto 42px; max-width: 300px; animation: fadeDown .9s .1s ease both; }
    .div-line { flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--rose-soft)); }
    .div-line.r { transform: scaleX(-1); }
    .div-dot { width:6px; height:6px; border-radius:50%; background: var(--rose-mid); }

    .countdown-strip { display: flex; justify-content: center; gap: clamp(10px,3vw,24px); margin-bottom: 50px; animation: fadeDown .9s .2s ease both; }
    .cd-unit { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .cd-box { background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); border-radius: 10px; width: clamp(58px,12vw,86px); height: clamp(62px,13vw,92px); display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 20px rgba(139,34,82,.1), inset 0 1px 0 rgba(255,255,255,.8); }
    .cd-num { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(24px,5vw,44px); color: var(--rose-deep); line-height:1; }
    .cd-num.pop { animation: numPop .25s ease; }
    @keyframes numPop { 0% { transform: scale(1.3); opacity: .4; } 100% { transform: scale(1); opacity: 1; } }
    .cd-label { font-size:9px; font-weight:300; letter-spacing:.25em; text-transform:uppercase; color:var(--rose-mid); }

    .section-title { text-align: center; margin-bottom: 30px; animation: fadeUp .8s .3s ease both; }
    .section-title h2 { font-family: 'Playfair Display', serif; font-style:italic; font-weight: 400; font-size: clamp(20px,3.5vw,30px); color: var(--rose-deep); }
    .section-title p { font-size:12px; font-weight:300; color:var(--text-mid); margin-top:6px; letter-spacing:.05em; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(90px,16vw,120px), 1fr)); gap: 10px; animation: fadeUp .8s .4s ease both; }

    .card { aspect-ratio: 1; border-radius: 12px; cursor: pointer; position: relative; overflow: hidden; transition: transform .22s ease, box-shadow .22s ease; user-select: none; }
    .card:hover { transform: translateY(-3px) scale(1.025); }
    .card.locked { background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(8px); box-shadow: 0 2px 10px rgba(139,34,82,.07), inset 0 1px 0 rgba(255,255,255,.7); cursor: default; }
    .card.locked:hover { transform: none; }
    .card-inner { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:4px; padding:8px; }
    .card-day-num { font-family: 'Playfair Display', serif; font-size: clamp(18px,3.5vw,26px); font-weight:700; color:var(--rose-deep); line-height:1; }
    .card-date-label { font-size: clamp(7px,1.2vw,9px); font-weight:300; color:var(--text-mid); letter-spacing:.05em; text-align:center; }
    .lock-icon { font-size: clamp(9px,1.8vw,13px); opacity:.35; margin-top:1px; }
    .card.unlocked { background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep)); box-shadow: 0 6px 22px rgba(139,34,82,.3); border: 1px solid rgba(255,255,255,.28); animation: cardReveal .4s ease both; }
    @keyframes cardReveal { from { transform:scale(.88); opacity:0; } to { transform:scale(1); opacity:1; } }
    .card.unlocked .card-day-num { color:#fff; }
    .card.unlocked .card-date-label { color:rgba(255,255,255,.7); }
    .card-type-icon { font-size: clamp(14px,3vw,20px); }
    .card.today { background: linear-gradient(135deg, #d4855a, var(--gold)); box-shadow: 0 8px 28px rgba(201,146,74,.45), 0 0 0 3px rgba(255,255,255,.6); animation: todayPulse 2.5s ease-in-out infinite, cardReveal .4s ease both; }
    @keyframes todayPulse { 0%,100% { box-shadow: 0 8px 28px rgba(201,146,74,.45), 0 0 0 3px rgba(255,255,255,.6); } 50% { box-shadow: 0 8px 38px rgba(201,146,74,.65), 0 0 0 5px rgba(255,255,255,.35); } }

    .modal-bg { position:fixed; inset:0; z-index:100; background: rgba(58,21,37,.5); backdrop-filter:blur(7px); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .3s ease; }
    .modal-bg.open { opacity:1; pointer-events:all; }
    .modal { background: var(--cream); border-radius: 20px; padding: clamp(26px,5vw,44px); max-width:480px; width:100%; box-shadow: 0 24px 80px rgba(139,34,82,.25); transform: translateY(22px) scale(.96); transition: transform .3s ease; border: 1px solid rgba(232,160,180,.35); }
    .modal-bg.open .modal { transform: translateY(0) scale(1); }

    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .modal-day-badge { font-size:10px; font-weight:300; letter-spacing:.3em; text-transform:uppercase; color:var(--rose-mid); background:rgba(196,84,122,.1); padding:5px 12px; border-radius:99px; border:1px solid rgba(196,84,122,.2); }
    .modal-close { width:32px; height:32px; border-radius:50%; border:1px solid rgba(196,84,122,.25); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--rose-mid); font-size:16px; transition:background .2s; }
    .modal-close:hover { background:rgba(196,84,122,.08); }

    .modal-icon { font-size:42px; margin-bottom:10px; display:block; text-align:center; }
    .modal-title { font-family:'Playfair Display',serif; font-style:italic; font-weight:400; font-size: clamp(18px,3.5vw,26px); color:var(--rose-deep); text-align:center; margin-bottom:14px; }
    .modal-divider { height:1px; background:linear-gradient(90deg,transparent,var(--rose-soft),transparent); margin:14px 0; }
    .modal-content { font-size: clamp(13px,2vw,15px); font-weight:300; color:var(--text-dark); line-height:1.85; text-align:center; white-space:pre-line; }
    .modal-signature { margin-top:20px; text-align:right; font-family:'Playfair Display',serif; font-style:italic; font-size:14px; color:var(--rose-mid); }

    footer { text-align:center; margin-top:60px; font-size:11px; font-weight:300; letter-spacing:.12em; color:var(--rose-deep); opacity: .5; }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width:480px) { .grid { grid-template-columns: repeat(4,1fr); gap:7px; } }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<div class="wrapper">
  <!-- tout le reste de ton HTML reste identique -->
  <header>
    <div class="logo-wrap">
      <img src="logo.PNG" alt="notre logo" class="logo-img"/>
    </div>
    <p class="eyebrow">De Rayan, avec tout son amour</p>
    <h1>Pour <strong>Salmouchee</strong></h1>
    <p class="subtitle">Un compte à rebours jusqu'à ton jour le plus spécial</p>
  </header>

  <div class="divider">
    <div class="div-line"></div><div class="div-dot"></div><div class="div-line r"></div>
  </div>

  <div class="countdown-strip">
    <div class="cd-unit"><div class="cd-box"><span class="cd-num" id="cd-days">--</span></div><span class="cd-label">Jours</span></div>
    <div class="cd-unit"><div class="cd-box"><span class="cd-num" id="cd-hours">--</span></div><span class="cd-label">Heures</span></div>
    <div class="cd-unit"><div class="cd-box"><span class="cd-num" id="cd-mins">--</span></div><span class="cd-label">Minutes</span></div>
    <div class="cd-unit"><div class="cd-box"><span class="cd-num" id="cd-secs">--</span></div><span class="cd-label">Secondes</span></div>
  </div>

  <div class="section-title">
    <h2>Tes surprises quotidiennes</h2>
    <p>Une nouvelle case s'ouvre chaque jour — découvre-les une à une</p>
  </div>

  <div class="grid" id="grid"></div>

  <footer>fait avec amour par Rayan &nbsp;·&nbsp; pour Salma</footer>
</div>

<!-- MODAL et SCRIPT restent exactement les mêmes que dans mon message précédent -->

</body>
</html>
