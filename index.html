:root {
  --rose-deep:   #8b2252;
  --rose-mid:    #c4547a;
  --rose-soft:   #e8a0b4;
  --rose-pale:   #f7dde6;
  --rose-blush:  #fdf0f4;
  --gold:        #c9924a;
  --cream:       #fff8f9;
  --text-dark:   #3a1525;
  --text-mid:    #7a3555;
  --glass:       rgba(255,255,255,0.55);
  --glass-border:rgba(196,84,122,0.18);
}

html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-dark);
  overflow-x: hidden;
}

/* BACKGROUND */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  /*
    ✏️ Pour utiliser ton propre fond :
    Remplace tout ce bloc par :
    background: url('bg.jpg') center/cover no-repeat fixed;
    Et dépose bg.jpg dans le même dossier que index.html
  */
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,160,180,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(196,84,122,0.2) 0%, transparent 60%),
    linear-gradient(160deg, #fdf0f4 0%, #f9e0ea 40%, #fdf0f4 100%);
  pointer-events: none;
}

.bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 150px;
}

.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.orb-1 { width: 450px; height: 450px; top: -140px; right: -120px; background: radial-gradient(circle, rgba(196,84,122,0.1), transparent 70%); }
.orb-2 { width: 320px; height: 320px; bottom: 40px; left: -90px; background: radial-gradient(circle, rgba(232,160,180,0.13), transparent 70%); }

/* WRAPPER */
.wrapper {
  position: relative;
  z-index: 1;
  max-width: 920px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

/* HEADER */
header {
  padding: 54px 0 38px;
  text-align: center;
  animation: fadeDown .9s ease both;
}

.logo-wrap { margin-bottom: 22px; }

/*
  ✏️ Pour mettre ton logo :
  Remplace .logo-placeholder par :
  <img src="logo.png" class="logo-img" alt="notre logo"/>

  Et ajoute ce CSS :
  .logo-img { width:84px; height:84px; border-radius:50%; object-fit:cover;
    box-shadow:0 8px 32px rgba(139,34,82,.25); border:3px solid rgba(255,255,255,.75); }
*/
.logo-placeholder {
  width: 84px; height: 84px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose-soft), var(--rose-deep));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 34px;
  box-shadow: 0 8px 32px rgba(139,34,82,.25), 0 2px 8px rgba(139,34,82,.15);
  border: 3px solid rgba(255,255,255,.75);
}

.eyebrow {
  font-weight: 200; font-size: 11px; letter-spacing: .4em;
  text-transform: uppercase; color: var(--rose-mid); margin-bottom: 10px;
}

h1 {
  font-family: 'Playfair Display', serif; font-weight: 400; font-style: italic;
  font-size: clamp(32px, 6vw, 58px); color: var(--rose-deep); line-height: 1.1; margin-bottom: 6px;
}
h1 strong { font-style: normal; font-weight: 700; }

.subtitle { font-size: 13px; font-weight: 300; color: var(--text-mid); letter-spacing: .07em; }

/* DIVIDER */
.divider {
  display: flex; align-items: center; gap: 14px;
  margin: 0 auto 42px; max-width: 300px;
  animation: fadeDown .9s .1s ease both;
}
.div-line { flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--rose-soft)); }
.div-line.r { transform: scaleX(-1); }
.div-dot { width:6px; height:6px; border-radius:50%; background: var(--rose-mid); }

/* COUNTDOWN */
.countdown-strip {
  display: flex; justify-content: center;
  gap: clamp(10px,3vw,24px); margin-bottom: 50px;
  animation: fadeDown .9s .2s ease both;
}
.cd-unit { display:flex; flex-direction:column; align-items:center; gap:5px; }
.cd-box {
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px); border-radius: 10px;
  width: clamp(58px,12vw,86px); height: clamp(62px,13vw,92px);
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 4px 20px rgba(139,34,82,.1), inset 0 1px 0 rgba(255,255,255,.8);
}
.cd-num {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: clamp(24px,5vw,44px); color: var(--rose-deep); line-height:1;
}
.cd-num.pop { animation: numPop .25s ease; }
@keyframes numPop {
  0%   { transform: scale(1.3); opacity: .4; }
  100% { transform: scale(1);   opacity: 1;  }
}
.cd-label { font-size:9px; font-weight:300; letter-spacing:.25em; text-transform:uppercase; color:var(--rose-mid); }

/* SECTION TITLE */
.section-title {
  text-align: center; margin-bottom: 30px;
  animation: fadeUp .8s .3s ease both;
}
.section-title h2 {
  font-family: 'Playfair Display', serif; font-style:italic;
  font-weight: 400; font-size: clamp(20px,3.5vw,30px); color: var(--rose-deep);
}
.section-title p { font-size:12px; font-weight:300; color:var(--text-mid); margin-top:6px; letter-spacing:.05em; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(clamp(90px,16vw,120px), 1fr));
  gap: 10px;
  animation: fadeUp .8s .4s ease both;
}

/* CARD */
.card {
  aspect-ratio: 1; border-radius: 12px; cursor: pointer;
  position: relative; overflow: hidden;
  transition: transform .22s ease, box-shadow .22s ease;
  user-select: none;
}
.card:hover { transform: translateY(-3px) scale(1.025); }

/* locked */
.card.locked {
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(6px);
  box-shadow: 0 2px 10px rgba(139,34,82,.07), inset 0 1px 0 rgba(255,255,255,.7);
  cursor: default;
}
.card.locked:hover { transform: none; }

.card-inner {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100%; gap:4px; padding:8px;
}

.card-day-num {
  font-family: 'Playfair Display', serif;
  font-size: clamp(18px,3.5vw,26px); font-weight:700; color:var(--rose-deep); line-height:1;
}
.card-date-label {
  font-size: clamp(7px,1.2vw,9px); font-weight:300; color:var(--text-mid);
  letter-spacing:.05em; text-align:center;
}
.lock-icon { font-size: clamp(9px,1.8vw,13px); opacity:.35; margin-top:1px; }

/* unlocked */
.card.unlocked {
  background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep));
  box-shadow: 0 6px 22px rgba(139,34,82,.3); border: 1px solid rgba(255,255,255,.28);
  animation: cardReveal .4s ease both;
}
@keyframes cardReveal {
  from { transform:scale(.88); opacity:0; }
  to   { transform:scale(1);   opacity:1; }
}
.card.unlocked .card-day-num { color:#fff; }
.card.unlocked .card-date-label { color:rgba(255,255,255,.7); }
.card-type-icon { font-size: clamp(14px,3vw,20px); }

/* today */
.card.today {
  background: linear-gradient(135deg, #d4855a, var(--gold));
  box-shadow: 0 8px 28px rgba(201,146,74,.45), 0 0 0 3px rgba(255,255,255,.6);
  animation: todayPulse 2.5s ease-in-out infinite, cardReveal .4s ease both;
}
@keyframes todayPulse {
  0%,100% { box-shadow: 0 8px 28px rgba(201,146,74,.45), 0 0 0 3px rgba(255,255,255,.6); }
  50%      { box-shadow: 0 8px 38px rgba(201,146,74,.65), 0 0 0 5px rgba(255,255,255,.35); }
}

/* MODAL */
.modal-bg {
  position:fixed; inset:0; z-index:100;
  background: rgba(58,21,37,.5); backdrop-filter:blur(7px);
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .3s ease;
}
.modal-bg.open { opacity:1; pointer-events:all; }

.modal {
  background: var(--cream); border-radius: 20px;
  padding: clamp(26px,5vw,44px); max-width:480px; width:100%;
  position:relative;
  box-shadow: 0 24px 80px rgba(139,34,82,.25);
  transform: translateY(22px) scale(.96); transition: transform .3s ease;
  border: 1px solid rgba(232,160,180,.35);
}
.modal-bg.open .modal { transform: translateY(0) scale(1); }

.modal-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;
}
.modal-day-badge {
  font-size:10px; font-weight:300; letter-spacing:.3em; text-transform:uppercase;
  color:var(--rose-mid); background:rgba(196,84,122,.1); padding:5px 12px;
  border-radius:99px; border:1px solid rgba(196,84,122,.2);
}
.modal-close {
  width:32px; height:32px; border-radius:50%; border:1px solid rgba(196,84,122,.25);
  background:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--rose-mid); font-size:16px; transition:background .2s;
}
.modal-close:hover { background:rgba(196,84,122,.08); }

.modal-icon { font-size:42px; margin-bottom:10px; display:block; text-align:center; }
.modal-title {
  font-family:'Playfair Display',serif; font-style:italic; font-weight:400;
  font-size: clamp(18px,3.5vw,26px); color:var(--rose-deep);
  text-align:center; margin-bottom:14px;
}
.modal-divider { height:1px; background:linear-gradient(90deg,transparent,var(--rose-soft),transparent); margin:14px 0; }
.modal-content {
  font-size: clamp(13px,2vw,15px); font-weight:300; color:var(--text-dark);
  line-height:1.85; text-align:center; white-space:pre-line;
}
.modal-signature {
  margin-top:20px; text-align:right;
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:14px; color:var(--rose-mid);
}

/* FOOTER */
footer {
  text-align:center; margin-top:60px; font-size:11px;
  font-weight:300; letter-spacing:.12em; color:var(--rose-soft);
}

/* UTILS */
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-18px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}

@media (max-width:480px) {
  .grid { grid-template-columns: repeat(4,1fr); gap:7px; }
}

<body>

<div class="bg-layer"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">

  <header>
    <div class="logo-wrap">
      <!--
        ✏️ LOGO : une fois que tu as logo.png dans le dossier GitHub,
        remplace ces 3 lignes par :
        <img src="logo.png" alt="notre logo" style="width:84px;height:84px;border-radius:50%;object-fit:cover;box-shadow:0 8px 32px rgba(139,34,82,.25);border:3px solid rgba(255,255,255,.75)"/>
      -->
      <div class="logo-placeholder">🌸</div>
    </div>
    <p class="eyebrow">De Rayan, avec tout son amour</p>
    <h1>Pour <strong>Salmouchee</strong></h1>
    <p class="subtitle">Un compte à rebours jusqu'à ton jour le plus spécial</p>
  </header>

  <div class="divider">
    <div class="div-line"></div><div class="div-dot"></div><div class="div-line r"></div>
  </div>

  <div class="countdown-strip">
    <div class="cd-unit"><div class="cd-box"><span class="cd-num" id="cd-days">--</span></div><span class="cd-label">Jours</span></div>
    <div class="cd-unit"><div class="cd-box"><span class="cd-num" id="cd-hours">--</span></div><span class="cd-label">Heures</span></div>
    <div class="cd-unit"><div class="cd-box"><span class="cd-num" id="cd-mins">--</span></div><span class="cd-label">Minutes</span></div>
    <div class="cd-unit"><div class="cd-box"><span class="cd-num" id="cd-secs">--</span></div><span class="cd-label">Secondes</span></div>
  </div>

  <div class="section-title">
    <h2>Tes surprises quotidiennes</h2>
    <p>Une nouvelle case s'ouvre chaque jour — découvre-les une à une</p>
  </div>

  <div class="grid" id="grid"></div>

  <footer>fait avec amour par Rayan &nbsp;·&nbsp; pour Salma</footer>
</div>

<!-- MODAL -->

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-day-badge" id="modal-badge">Jour 1</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <span class="modal-icon" id="modal-icon">🌸</span>
    <h3 class="modal-title" id="modal-title"></h3>
    <div class="modal-divider"></div>
    <p class="modal-content" id="modal-content"></p>
    <p class="modal-signature">— Rayan</p>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   CONFIGURATION
════════════════════════════════════════════ */
const BIRTHDAY = new Date("2026-10-26T00:00:00");

/* ════════════════════════════════════════════
   SURPRISES
   Ajoute autant d'objets que tu veux.
   Le reste des cases affichera un message générique.
   Types / icônes suggérés :
     lettre 💌   photo 📸   projet 🗺️
     message 💬  chanson 🎵  souvenir 🌙
════════════════════════════════════════════ */
const SURPRISES = [
  {
    icon: "💬", title: "Le premier jour",
    content: "Aujourd'hui c'est le premier jour de ce compte à rebours, et je voulais juste te dire que tu es ma personne préférée au monde.\n\nChaque jour qui passe me rapproche de toi, Salmouchee. Je t'aime."
  },
  {
    icon: "🌙", title: "Ce soir-là…",
    content: "✏️ Raconte ici un souvenir qui te tient à cœur. Un soir, un moment, un regard. Sois précis, elle adorera."
  },
  {
    icon: "💌", title: "Une lettre pour toi",
    content: "✏️ Écris une vraie lettre ici. Parle-lui de ce qu'elle représente pour toi, de ses petits détails que t'aimes chez elle. Sois toi-même."
  },
  {
    icon: "🗺️", title: "Ce qu'on va faire ensemble",
    content: "✏️ Décris un projet que vous avez, ou une surprise que tu lui prépares. Un voyage, un restaurant, une sortie… laisse-la rêver."
  },
  {
    icon: "📸", title: "Ma photo préférée de nous",
    content: "✏️ Décris la photo, le moment, pourquoi c'est ta préférée. Ou intègre directement une vraie image dans le code si tu veux."
  },
  {
    icon: "🎵", title: "La chanson qui me fait penser à toi",
    content: "✏️ Mets ici le titre + artiste, et pourquoi cette chanson te fait penser à elle. Les détails comptent."
  },
  {
    icon: "💬", title: "Ce que j'aime chez toi",
    content: "✏️ Fais une liste des choses que t'aimes chez elle. Petites ou grandes, peu importe. Sois sincère, c'est ce qui compte le plus."
  },
  // ✏️ Continue ici autant que tu veux...
];

/* ════════════════════════════════════════════
   NE PAS MODIFIER EN DESSOUS
════════════════════════════════════════════ */
function daysBetween(a, b) {
  const d = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate())
           - Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  return Math.ceil(d / 86400000);
}
function pad(n) { return String(n).padStart(2,"0"); }
function formatDate(d) {
  const m = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
  return `${d.getDate()} ${m[d.getMonth()]}`;
}

const today    = new Date();
const total    = daysBetween(today, BIRTHDAY);
const grid     = document.getElementById("grid");

for (let i = 0; i < total; i++) {
  const date = new Date(today);
  date.setDate(today.getDate() + i);

  const card      = document.createElement("div");
  card.className  = "card";
  const isToday   = i === 0;
  const unlocked  = i <= 0; // les jours passés + aujourd'hui sont ouverts
  const surprise  = SURPRISES[i] || null;

  if (unlocked) {
    card.classList.add("unlocked");
    if (isToday) card.classList.add("today");
    card.innerHTML = `<div class="card-inner">
      <span class="card-type-icon">${surprise ? surprise.icon : "🎁"}</span>
      <span class="card-day-num">${i+1}</span>
      <span class="card-date-label">${formatDate(date)}</span>
    </div>`;
    card.addEventListener("click", () => openModal(i+1, date, surprise));
  } else {
    card.classList.add("locked");
    card.innerHTML = `<div class="card-inner">
      <span class="card-day-num">${i+1}</span>
      <span class="card-date-label">${formatDate(date)}</span>
      <span class="lock-icon">🔒</span>
    </div>`;
  }
  grid.appendChild(card);
}

// Countdown
const els = {
  d: document.getElementById("cd-days"),
  h: document.getElementById("cd-hours"),
  m: document.getElementById("cd-mins"),
  s: document.getElementById("cd-secs"),
};
function popEl(el, v) {
  const s = pad(v);
  if (el.textContent !== s) {
    el.textContent = s;
    el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop");
  }
}
function tick() {
  const diff = BIRTHDAY - new Date();
  if (diff <= 0) { Object.values(els).forEach(e => e.textContent = "00"); return; }
  popEl(els.d, Math.floor(diff/86400000));
  popEl(els.h, Math.floor((diff%86400000)/3600000));
  popEl(els.m, Math.floor((diff%3600000)/60000));
  popEl(els.s, Math.floor((diff%60000)/1000));
}
tick(); setInterval(tick, 1000);

// Modal
function openModal(dayNum, date, surprise) {
  document.getElementById("modal-badge").textContent   = `Jour ${dayNum} · ${formatDate(date)}`;
  document.getElementById("modal-icon").textContent    = surprise ? surprise.icon : "🎁";
  document.getElementById("modal-title").textContent   = surprise ? surprise.title : `Surprise du jour ${dayNum}`;
  document.getElementById("modal-content").textContent = surprise
    ? surprise.content
    : "Rayan n'a pas encore rempli cette case, mais il pense à toi aujourd'hui, Salmouchee.";
  document.getElementById("modal-bg").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(e) { if (e.target === document.getElementById("modal-bg")) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById("modal-bg").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModalDirect(); });
</script>

</body>
